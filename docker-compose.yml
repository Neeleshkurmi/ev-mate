services:
  postgres:
    image: postgres:16-alpine
    container_name: ev-mate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ev_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ev_booking"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
